name: Keep Supabase Alive

on:
  schedule:
    # Every 4 days at 06:17 UTC (off-peak, avoids :00/:30)
    - cron: '17 6 */4 * *'
  workflow_dispatch: # Manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/questions?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase responded with HTTP $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "::warning::Supabase returned $STATUS — project may be paused"
            exit 1
          fi
